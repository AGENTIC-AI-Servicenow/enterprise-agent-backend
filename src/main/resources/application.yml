app:
  timezone: America/Lima

server:
  port: 8080

servicenow:
  instance:
    url: https://everisspainsludemo3.service-now.com
  base-url: https://everisspainsludemo3.service-now.com
  auth:
    mode: oauth # basic or oauth
    username: ${SERVICENOW_USERNAME:your-username}
    password: ${SERVICENOW_PASSWORD:your-password}
  oauth:
    client-id: ${SERVICENOW_CLIENT_ID:}
    client-secret: ${SERVICENOW_CLIENT_SECRET:}
    authorization-url: ${SERVICENOW_AUTHORIZATION_URL:https://everisspainsludemo3.service-now.com/oauth_auth.do}
    token-url: ${SERVICENOW_TOKEN_URL:https://everisspainsludemo3.service-now.com/oauth_token.do}
    redirect-uri: ${SERVICENOW_REDIRECT_URI:http://localhost:8080/oauth/callback}
    # OAuth scopes requested during authorize and token exchange.
    # Must match what is configured in the ServiceNow Application Registry for this client.
    scope: ${SERVICENOW_SCOPE:useraccount}

frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

llm:
  provider: azure

  ollama:
    base-url: http://localhost:11434
    model: qwen2.5:7b

  azure:
    endpoint: ${AZURE_OPENAI_ENDPOINT:}
    deployment: ${AZURE_OPENAI_DEPLOYMENT:gpt-4o-mini}
    api-key: ${AZURE_OPENAI_KEY:}
    api-version: ${AZURE_OPENAI_API_VERSION:2024-02-15-preview}
    use-responses-api: ${AZURE_OPENAI_USE_RESPONSES_API:false}

logging:
  level:
    com.enterprise.agent: DEBUG
    org.springframework.web.reactive.function.client: DEBUG
    reactor.netty.http.client: DEBUG
